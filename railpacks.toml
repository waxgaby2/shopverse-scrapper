[build]
builder = "nixpacks"

[phases.setup]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libexpat1",
  "libdrm2",
  "libxkbcommon0",
  "libgtk-3-0",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2"
]

[phases.install]
cmds = [
  "npm install",
  "npx playwright install chromium"
]

[start]
cmd = "npm start"